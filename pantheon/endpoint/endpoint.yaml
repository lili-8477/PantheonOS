service_name: "pantheon-chatroom-endpoint"
workspace_path: "./.pantheon-chatroom-workspace"
log_level: "INFO"
# If you want to allow file transfer through the endpoint, set it to true
allow_file_transfer: true
# If you want to use a specific id hash, set it here
#id_hash: "xxxx"

# Service modes configuration - specify which services run in local or remote mode
# local: runs in the same process as endpoint (faster, uses ThreadJob for isolation)
# remote: runs in separate process (slower, better isolation)
# Special key "default" specifies the mode for services not explicitly listed
# If "default" is not specified, it defaults to "local"
service_modes:
  default: "local"        # Default mode for services not explicitly listed below
  # python_interpreter: "local"         # Fast lightweight services work well in local mode
  # julia_interpreter: "remote"       # Heavy computation might need isolation run in separate processes

# Local toolset configuration
local_toolset_timeout: 600  # Timeout in seconds for local toolset method calls (default: 60)
local_toolset_execution_mode: "direct"  # Default: "direct", options: "thread", "direct"

# Built-in services that will be automatically started with the endpoint
# These services are available immediately without manual startup
builtin_services:
  # === Tier 1: Essential Services (Recommended for all deployments) ===
  - todolist              # Task management with session isolation
  - file_manager          # File operations (read, write, list, delete, etc.)

  # === Tier 2: Common Development Tools ===
  - code_search           # Code search (glob, grep, semantic search)
  # - file_editor           # Advanced file editing (Claude Code-like)
  - web                   # Web search and fetch (using DDGS)
  - python_interpreter    # Python code execution
  - shell                 # Shell command execution (use with caution)
  - knowledge
  # === Tier 3: Advanced Tools (Add as needed) ===
  - integrated_notebook   # Integrated notebook with file ops
  - jupyter_kernel        # Standard Jupyter kernel

  # === Additional Available Services (Commented - enable as needed) ===
  # Interpreters:
  # - r_interpreter       # R code execution
  # - julia_interpreter   # Julia code execution

  # Web & Scraping:
  # - scraper             # ScraperAPI-based search and crawl (requires API key)

  # Document Processing:
  # - latex               # LaTeX compilation to PDF

  # Workflows:
  - workflow            # Agentic workflow service

  # Bioinformatics (Specialized - add only for bio workloads):
  # - gene_agent          # Gene set analysis
  - database_query      # Bio database queries (OmicVerse)
  # - rna_upstream        # RNA-seq upstream (FASTQ → expression)
  # - rna_analysis        # RNA-seq downstream analysis
  # - atac_upstream       # ATAC-seq upstream
  # - atac_analysis       # ATAC-seq downstream
  # - hic_upstream        # Hi-C upstream
  # - hic_analysis        # Hi-C analysis
  # - scrna_upstream      # Single-cell RNA upstream
  # - scrna_analysis      # Single-cell RNA analysis
  # - scatac_upstream     # Single-cell ATAC upstream
  # - scatac_analysis     # Single-cell ATAC analysis
  # - spatial_analysis    # Spatial transcriptomics
  # - molecular_docking   # Protein-ligand docking
  # - single_cell_agent   # Single-cell comprehensive analysis

