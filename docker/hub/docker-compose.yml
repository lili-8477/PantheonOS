name: pantheon-hub

# =============================================================================
# PantheonOS Hub Mode - Multi-User Deployment
# =============================================================================
# Shared infrastructure (NATS + Qdrant) with per-user Pantheon containers.
#
# Usage:
#   1. Start shared infra:  docker compose up -d nats qdrant nginx
#   2. Add users:           ./scripts/add-user.sh <username>
#   3. Remove users:        ./scripts/remove-user.sh <username>
#   4. View status:         docker compose ps
# =============================================================================

services:
  # ─── Shared NATS Message Broker ───────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: pantheon-nats
    command: -c /etc/nats/nats-ws.conf
    ports:
      - "4222:4222"     # NATS client (internal use)
      - "8080:8080"     # NATS WebSocket (internal, proxied via nginx /ws/)
      - "8222:8222"     # NATS monitoring (for health checks)
    volumes:
      - ./config/nats-ws.conf:/etc/nats/nats-ws.conf:ro
      - ./config/certs:/etc/nats/certs:ro
      - nats_jetstream:/tmp/nats/jetstream
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - pantheon-network

  # ─── Shared Qdrant Vector Database ────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: pantheon-qdrant
    ports:
      - "127.0.0.1:6333:6333"   # HTTP API (localhost only)
      - "127.0.0.1:6334:6334"   # gRPC API (localhost only)
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - pantheon-network

  # ─── Nginx Reverse Proxy + Auth ───────────────────────────────────────────
  # Internal-only; Caddy terminates TLS and proxies to nginx:80.
  # If you don't need HTTPS, comment out the caddy service below and add
  # `ports: ["80:80"]` here to expose nginx directly.
  nginx:
    image: nginx:alpine
    container_name: pantheon-nginx
    expose:
      - "80"
    volumes:
      - ../../frontend/bioflow:/usr/share/nginx/html:ro
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/htpasswd:/etc/nginx/htpasswd:ro
      - ./config/certs:/etc/nginx/certs:ro
    depends_on:
      nats:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pantheon-network

  # ─── Caddy: Public HTTPS Entrypoint (auto Let's Encrypt) ──────────────────
  # Requires:
  #   - A public domain pointed at this host (A record → public IP)
  #   - Ports 80 + 443 reachable from the internet (router port-forward if NAT'd)
  #   - config/Caddyfile created from config/Caddyfile.example with your domain
  caddy:
    image: caddy:2-alpine
    container_name: pantheon-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nginx
    restart: unless-stopped
    networks:
      - pantheon-network

  # ─── User Pantheon Containers (added dynamically) ─────────────────────────
  # Each user is added via ./scripts/add-user.sh which creates a container.
  #
  # Usage:
  #   ./scripts/add-user.sh alice                              # basic
  #   ./scripts/add-user.sh alice --data /home/alice/my-data   # with data mount
  #   ./scripts/add-user.sh alice --data /data/project1:/workspace/projects/p1
  #   ./scripts/add-user.sh alice --image pantheon-agents-r:latest
  #
  # Data mounts:
  #   --data /path              → /workspace/data/<dirname>
  #   --data /path:/target      → explicit mount point
  #   data/shared/ (auto)       → /workspace/shared (read-only, all users)
  #
  # Example container for reference:
  #
  # pantheon-alice:
  #   image: nanguage/pantheon-agents:latest
  #   container_name: pantheon-user-alice
  #   environment:
  #     - PANTHEON_MODE=hub
  #     - ID_HASH=alice
  #     - PANTHEON_REMOTE_BACKEND=nats
  #     - NATS_SERVERS=nats://nats:4222
  #     - NATS_MONITOR_URL=http://nats:8222
  #     - QDRANT_LOCATION=http://qdrant:6333
  #     - QDRANT_HTTP_URL=http://qdrant:6333
  #   env_file:
  #     - ./workspaces/alice/.env
  #   volumes:
  #     - ./workspaces/alice:/workspace
  #     - ./data/shared:/workspace/shared:ro
  #     - /home/alice/my-data:/workspace/data/my-data
  #   working_dir: /workspace
  #   depends_on:
  #     nats:
  #       condition: service_healthy
  #     qdrant:
  #       condition: service_healthy
  #   restart: unless-stopped
  #   networks:
  #     - pantheon-network

volumes:
  nats_jetstream:
    driver: local
  qdrant_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  pantheon-network:
    driver: bridge
