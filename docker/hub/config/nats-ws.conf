# NATS Server Configuration - Hub Mode (Multi-User)

listen: 0.0.0.0:4222
server_name: pantheon-nats-hub

# WebSocket - use Chrome flag to allow ws:// from HTTPS page:
#   chrome://flags/#unsafely-treat-insecure-origin-as-secure
#   Add: http://192.168.86.32:8080
websocket {
  host: 0.0.0.0
  port: 8080
  no_tls: true
  same_origin: false
  handshake_timeout: "2s"
  compression: true
}

# Connection limits
max_connections: 1000
max_payload: 10MB
max_pending: 64MB

# Keepalive
ping_interval: 120s
ping_max: 3
write_deadline: 10s

# JetStream (persistent messaging)
jetstream {
  store_dir: "/tmp/nats/jetstream"
  max_memory_store: 2GB
  max_file_store: 20GB
}

# Monitoring
http_port: 8222
logtime: true
debug: false
trace: false

# Clustering (uncomment with routes when scaling to multiple nodes)
# cluster {
#   name: pantheon-cluster
#   listen: 0.0.0.0:6222
#   routes = [
#     "nats://other-node:6222"
#   ]
# }

# Authentication - uncomment for production
# authorization {
#   users = [
#     {user: "pantheon-hub", password: "$NATS_PASSWORD", permissions: {publish: ">", subscribe: ">"}}
#   ]
# }
