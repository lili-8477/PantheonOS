worker_processes auto;

events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=10r/s;

    # ── Single server on port 80 ────────────────────────────────────────
    # External proxy (bioresearchchat.selfai.cc) handles TLS → port 80
    server {
        listen 80;
        server_name _;

        # /ws/ → NATS WebSocket (for bioFlow UI connection)
        location /ws/ {
            proxy_pass http://nats:8080/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            limit_req zone=ws_limit burst=20 nodelay;
        }

        # /nats/ → NATS monitoring (auth required)
        location /nats/ {
            auth_basic "bioFlow Hub Admin";
            auth_basic_user_file /etc/nginx/htpasswd;
            proxy_pass http://nats:8222/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check
        location /healthz {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # Everything else → bioFlow UI (self-hosted)
        location / {
            root /usr/share/nginx/html;
            include /etc/nginx/mime.types;
            try_files $uri $uri/ /index.html;

            # Cache static assets (hashed filenames)
            location /assets/ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}
